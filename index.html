<body>

<div class="container">

    <!-- MENU -->
    <section id="menu-screen">

        <h1>⚽ Penalty Shootout Challenge</h1>

        <input
            id="player-name"
            placeholder="Player Name"
        >

        <input
            id="player-a"
            placeholder="Player A Name"
            class="hidden"
        >

        <input
            id="player-b"
            placeholder="Player B Name"
            class="hidden"
        >

        <h3>Game Mode</h3>

        <button id="single-mode-btn">
            Single Player
        </button>

        <button id="duel-mode-btn">
            Two Player Duel
        </button>

        <h3>Difficulty</h3>

        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>

        <button id="start-btn">
            Start Match
        </button>

    </section>

    <!-- GAME -->
    <section
        id="game-screen"
        class="hidden"
    >

        <h2 id="role-display"></h2>

        <div class="scoreboard">

            <div>
                <h3>Player A</h3>
                <span id="score-a">0</span>
            </div>

            <div>
                <h3>Timer</h3>
                <span id="timer">5</span>
            </div>

            <div>
                <h3>Player B</h3>
                <span id="score-b">0</span>
            </div>

        </div>

        <div class="field">

            <div id="goalkeeper">🧤</div>

            <div id="ball">⚽</div>

        </div>

        <h2 id="message">
            Take Your Shot
        </h2>

        <div class="buttons">

            <button id="left-btn">
                LEFT
            </button>

            <button id="center-btn">
                CENTER
            </button>

            <button id="right-btn">
                RIGHT
            </button>

        </div>

    </section>

    <!-- PASS DEVICE -->
    <section
        id="pass-screen"
        class="hidden"
    >

        <h1>
            Pass Device
        </h1>

        <h2 id="pass-message"></h2>

        <button id="continue-btn">
            Continue
        </button>

    </section>

    <!-- RESULT -->
    <section
        id="result-screen"
        class="hidden"
    >

        <h1 id="result-title"></h1>

        <p id="result-details"></p>

        <button id="next-btn">
            Next
        </button>

    </section>

    <!-- FINAL -->
    <section
        id="final-screen"
        class="hidden"
    >

        <h1>
            Match Complete
        </h1>

        <h2 id="winner-text"></h2>

        <button id="restart-btn">
            Play Again
        </button>

    </section>

</div>

<script src="script.js"></script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penalty Shootout Challenge</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- MAIN MENU -->
        <div id="start-screen">

            <h1>⚽ Penalty Shootout Challenge</h1>

            <p class="subtitle">
                Test your penalty-taking skills and become the ultimate striker.
            </p>

            <div class="menu-section">

                <label for="player-name">
                    Player Name
                </label>

                <input
                    type="text"
                    id="player-name"
                    placeholder="Enter your name"
                    maxlength="20"
                >

            </div>

            <div class="menu-section">

                <h3>Game Mode</h3>

                <label class="radio-option">
                    <input
                        type="radio"
                        name="mode"
                        value="single"
                        checked
                    >
                    Single Player
                </label>

                <label class="radio-option">
                    <input
                        type="radio"
                        name="mode"
                        value="duel"
                    >
                    Two Player Duel
                </label>

            </div>

            <div class="menu-section">

                <h3>Difficulty</h3>

                <label class="radio-option">
                    <input
                        type="radio"
                        name="difficulty"
                        value="easy"
                        checked
                    >
                    Easy
                </label>

                <label class="radio-option">
                    <input
                        type="radio"
                        name="difficulty"
                        value="medium"
                    >
                    Medium
                </label>

                <label class="radio-option">
                    <input
                        type="radio"
                        name="difficulty"
                        value="hard"
                    >
                    Hard
                </label>

            </div>

            <button id="start-btn">
                Start Match
            </button>

        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="hidden">

            <h2 id="player-display">
                Welcome Striker
            </h2>

            <div class="scoreboard">

                <div>
                    <h3>Score</h3>
                    <span id="score">0</span>
                </div>

                <div>
                    <h3>Shots Left</h3>
                    <span id="shots-left">5</span>
                </div>

                <div>
                    <h3>Timer</h3>
                    <span id="timer">5</span>
                </div>

            </div>

            <h2 id="prompt">
                Take Your Shot!
            </h2>

            <div class="field">

                <div id="goalkeeper">
                    🧤
                </div>

                <div id="ball">
                    ⚽
                </div>

            </div>

            <div class="buttons">

                <button id="left-btn">
                    Shoot Left
                </button>

                <button id="center-btn">
                    Shoot Center
                </button>

                <button id="right-btn">
                    Shoot Right
                </button>

            </div>

            <h2 id="result"></h2>

        </div>

        <!-- END SCREEN -->
        <div id="end-screen" class="hidden">

            <h2>
                Match Complete
            </h2>

            <p>
                <strong>Player:</strong>
                <span id="end-player"></span>
            </p>

            <p>
                <strong>Final Score:</strong>
                <span id="final-score"></span>
            </p>

            <p>
                <strong>Accuracy:</strong>
                <span id="accuracy"></span>
            </p>

            <p>
                <strong>Difficulty:</strong>
                <span id="difficulty-result"></span>
            </p>

            <p>
                <strong>Rating:</strong>
                <span id="rating"></span>
            </p>

            <button id="restart-btn">
                Play Again
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
